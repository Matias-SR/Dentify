spring:
  application:
    name: mc-api-gateway
server:
  port: 8090

spring:
  application:
    name: mc-api-gateway

  cloud:
    gateway:
      mvc:
        routes:
          - id: "mc-agenda"
            uri: "http://localhost:8083"
            predicates:
              - Path=/api/agenda/**

          - id: "mc-dentista"
            uri: "http://localhost:8082"
            predicates:
              - Path=/api/dentistas/**

          - id: "mc-login"
            uri: "http://localhost:8080"
            predicates:
              - Path=/api/login/**

          - id: "mc-notificaciones"
            uri: "http://localhost:8085"
            predicates:
              - Path=/api/notificaciones/**

          - id: "mc-observaciones"
            uri: "http://localhost:8084"
            predicates:
              - Path=/api/observaciones/**

          - id: "mc-paciente"
            uri: "http://localhost:8081"
            predicates:
              - Path=/api/paciente/**

          - id: "mc-pagos"
            uri: "http://localhost:8088"
            predicates:
              - Path=/api/pagos/**

          - id: "mc-prestaciones"
            uri: "http://localhost:8086"
            predicates:
              - Path=/api/prestaciones/**

          - id: "mc-presupuesto"
            uri: "http://localhost:8089"
            predicates:
              - Path=/api/presupuesto/**
              
          - id: "mc-reporte"
            uri: "http://localhost:8087"
            predicates:
              - Path=/api/reporte/**